kind = "web"
previewPath = "/"
title = "Exam Roadmap Platform"
version = "1.0.0"
id = "artifacts/exam-roadmap"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21921

[services.development]
run = "pnpm --filter @workspace/exam-roadmap run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/exam-roadmap", "run", "build" ]
publicDir = "artifacts/exam-roadmap/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21921"
BASE_PATH = "/"
