openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.3.0
  description: PrepMap Exam Roadmap Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: configs
    description: Exam configurations
  - name: nodes
    description: Syllabus nodes (units, topics, subtopics)
  - name: subtopics
    description: Subtopic content
  - name: events
    description: Event tracking
  - name: admin
    description: Admin operations
  - name: storage
    description: Object storage upload and serving
  - name: generation
    description: AI content generation
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with college ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/reset-password:
    post:
      operationId: resetPassword
      tags: [auth]
      summary: Reset password for a student
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordRequest"
      responses:
        "200":
          description: Password reset successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /configs:
    get:
      operationId: getConfigs
      tags: [configs]
      summary: Get exam configurations
      parameters:
        - name: universityId
          in: query
          required: false
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [draft, live]
      responses:
        "200":
          description: List of configs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Config"
    post:
      operationId: createConfig
      tags: [configs]
      summary: Create a new config
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateConfigRequest"
      responses:
        "201":
          description: Config created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Config"

  /configs/{id}/upload:
    post:
      operationId: uploadConfigFiles
      tags: [configs]
      summary: Upload syllabus and paper files for a config
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadConfigFilesRequest"
      responses:
        "200":
          description: Files saved to config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /configs/{id}/generate:
    post:
      operationId: triggerGeneration
      tags: [generation]
      summary: Trigger AI content generation for a config
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "202":
          description: Generation started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /configs/{id}/generation-status:
    get:
      operationId: getGenerationStatus
      tags: [generation]
      summary: Poll generation progress
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Generation status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerationStatus"

  /configs/{id}/publish:
    post:
      operationId: publishConfig
      tags: [configs]
      summary: Publish a draft config to live
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Config published
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /nodes:
    get:
      operationId: getNodes
      tags: [nodes]
      summary: Get syllabus nodes for a config
      parameters:
        - name: configId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of nodes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Node"

  /subtopics/{id}:
    get:
      operationId: getSubtopicContent
      tags: [subtopics]
      summary: Get subtopic content by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Subtopic content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubtopicContent"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateSubtopicContent
      tags: [subtopics]
      summary: Update subtopic explanation and questions
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSubtopicRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /events:
    post:
      operationId: trackEvent
      tags: [events]
      summary: Track a subtopic consumed event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventPayload"
      responses:
        "201":
          description: Event tracked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Get subtopic event counts for admin
      responses:
        "200":
          description: Admin stats
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SubtopicStat"

  /storage/uploads/request-url:
    post:
      tags: [storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadUrlRequest"
      responses:
        "200":
          description: Presigned upload URL generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadUrlResponse"

  /storage/public-objects/{filePath}:
    get:
      tags: [storage]
      operationId: getPublicObject
      summary: Serve a public asset
      parameters:
        - name: filePath
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Object content
          content:
            "*/*":
              schema:
                type: string
                format: binary

  /storage/objects/{objectPath}:
    get:
      tags: [storage]
      operationId: getStorageObject
      summary: Serve an uploaded object
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Object content
          content:
            "*/*":
              schema:
                type: string
                format: binary

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
      required:
        - success

    LoginRequest:
      type: object
      properties:
        collegeId:
          type: string
        password:
          type: string
      required:
        - collegeId
        - password

    LoginResponse:
      type: object
      properties:
        id:
          type: string
        universityId:
          type: string
        branch:
          type: string
        year:
          type: string
        role:
          type: string
          enum: [admin, student, super_student]
      required:
        - id
        - universityId
        - branch
        - year
        - role

    ResetPasswordRequest:
      type: object
      properties:
        collegeId:
          type: string
        currentPassword:
          type: string
        newPassword:
          type: string
      required:
        - collegeId
        - currentPassword
        - newPassword

    CreateConfigRequest:
      type: object
      properties:
        universityId:
          type: string
        year:
          type: string
        branch:
          type: string
        subject:
          type: string
        exam:
          type: string
          enum: [mid1, mid2, endsem]
      required:
        - universityId
        - year
        - branch
        - subject
        - exam

    UploadConfigFilesRequest:
      type: object
      properties:
        syllabusFileUrl:
          type: string
        paperFileUrls:
          type: array
          items:
            type: string
      required:
        - syllabusFileUrl
        - paperFileUrls

    Config:
      type: object
      properties:
        id:
          type: string
        universityId:
          type: string
        year:
          type: string
        branch:
          type: string
        subject:
          type: string
        exam:
          type: string
          enum: [mid1, mid2, endsem]
        status:
          type: string
          enum: [draft, live]
        createdBy:
          type: string
        createdAt:
          type: string
        syllabusFileUrl:
          type: string
          nullable: true
        paperFileUrls:
          type: array
          items:
            type: string
          nullable: true
      required:
        - id
        - universityId
        - year
        - branch
        - subject
        - exam
        - status
        - createdBy

    GenerationStatus:
      type: object
      properties:
        configId:
          type: string
        status:
          type: string
          enum: [idle, parsing, generating, complete, error]
        progress:
          type: integer
        total:
          type: integer
        currentStep:
          type: string
        error:
          type: string
          nullable: true
      required:
        - configId
        - status
        - progress
        - total
        - currentStep

    Node:
      type: object
      properties:
        id:
          type: string
        configId:
          type: string
        title:
          type: string
        type:
          type: string
          enum: [unit, topic, subtopic]
        parentId:
          type: string
          nullable: true
        explanation:
          type: string
          nullable: true
        sortOrder:
          type: string
      required:
        - id
        - configId
        - title
        - type

    SubtopicQuestion:
      type: object
      properties:
        id:
          type: integer
        markType:
          type: string
          enum: ["2", "5"]
        question:
          type: string
        answer:
          type: string
      required:
        - id
        - markType
        - question
        - answer

    SubtopicContent:
      type: object
      properties:
        id:
          type: string
        nodeId:
          type: string
        explanation:
          type: string
        questions:
          type: array
          items:
            $ref: "#/components/schemas/SubtopicQuestion"
      required:
        - id
        - nodeId
        - explanation
        - questions

    UpdateSubtopicRequest:
      type: object
      properties:
        explanation:
          type: string
        questions:
          type: array
          items:
            $ref: "#/components/schemas/UpdateQuestion"
      required:
        - explanation
        - questions

    UpdateQuestion:
      type: object
      properties:
        id:
          type: integer
          nullable: true
        markType:
          type: string
          enum: ["2", "5"]
        question:
          type: string
        answer:
          type: string
      required:
        - markType
        - question
        - answer

    EventPayload:
      type: object
      properties:
        userId:
          type: string
        universityId:
          type: string
        year:
          type: string
        branch:
          type: string
        exam:
          type: string
        configId:
          type: string
        topicId:
          type: string
        subtopicId:
          type: string
      required:
        - userId
        - universityId
        - year
        - branch
        - exam
        - configId
        - topicId
        - subtopicId

    SubtopicStat:
      type: object
      properties:
        subtopicId:
          type: string
        subtopicTitle:
          type: string
        eventCount:
          type: integer
      required:
        - subtopicId
        - subtopicTitle
        - eventCount

    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
          minLength: 1
        size:
          type: integer
          minimum: 1
        contentType:
          type: string
          minLength: 1

    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
          format: uri
        objectPath:
          type: string
        metadata:
          $ref: "#/components/schemas/UploadUrlRequest"

